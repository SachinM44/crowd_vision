# mosquitto.conf — venue/production MQTT broker for the zone-brain.
# OWNER: Gamma. Sim/dev uses the embedded amqtt broker instead (no install).
#
# Start:  mosquitto -c mosquitto.conf -v
#
# The CrowdVision topic tree (see docs/MESSAGES.md):
#   cv/zone/{id}/density · cv/camera/{id}/health · cv/gate/{id}/cmd ·
#   cv/gate/{id}/telemetry · cv/officer/{id}/beacon · cv/incident/new ·
#   cv/dispatch/{officer_id} · cv/venue/advisory · cv/venue/state ·
#   cv/sys/heartbeat/{device} (retained + LWT)

listener 1883 0.0.0.0
allow_anonymous true          # closed private hotspot LAN; no shared internet

# Retained heartbeats + LWT drive every device's failure choreography.
persistence true
persistence_location ./
autosave_interval 30

# QoS 1 + retained gate commands are honored per-publish (see _lib/mqttc.py).
max_inflight_messages 40
max_queued_messages 1000

# Keep logs quiet but useful during the demo.
log_type warning
log_type notice
connection_messages true

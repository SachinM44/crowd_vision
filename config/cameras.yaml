# config/cameras.yaml — camera mesh sources + per-camera homography profiles.
# OWNER: Gamma (writes) — Alpha's capture.py/homography.py READ it.
# RTSP URLs + homography filled at the venue by tools/calibrate.py --camera cN.
#
# transport: file | webcam | rtsp.  A missing/unreachable source => capture.py
# marks it DEGRADED/LOST honestly (Hard Rule 7).

defaults:
  resolution: "640x480"
  fps_cap: 12

cameras:
  feed_a:                       # scripted surge clip — deterministic kill-shot
    transport: file
    url: "sim/assets/surge_zoneA.mp4"   # looped file feed (staged; sim uses synthetic)
    zone_id: A
    # Identity homography until calibrated (image px == floor m placeholder).
    homography: [[1, 0, 0], [0, 1, 0], [0, 0, 1]]

  c1:                           # Nothing phone (hotspot host) -> Zone B (IP Webcam)
    transport: ipwebcam         # polls http://IP:8080/shot.jpg (robust over slow links)
    url: "http://10.149.252.155:8080"   # session-specific LAN IP — update per venue
    # No phones? point url at tools/fake_ipcam.py (http://127.0.0.1:8090) to
    # drive this feed with real CrowdHuman frames — the whole live path tested
    # that way (WSL capture -> YOLO -> density RED) on 2026-07-12.
    zone_id: B
    homography: [[1, 0, 0], [0, 1, 0], [0, 0, 1]]

  c2:                           # second camera phone -> Zone C (add URL when available)
    transport: ipwebcam
    url: "http://PHONE_C2_IP:8080"      # placeholder => skipped cleanly by live capture
    zone_id: C
    homography: [[1, 0, 0], [0, 1, 0], [0, 0, 1]]

  c3:                           # Laptop webcam -> Zone D (no /dev/video0 in WSL)
    transport: webcam
    url: "PHONE_C3_IP"           # placeholder => skipped (decode runs in WSL, no webcam there)
    zone_id: D
    homography: [[1, 0, 0], [0, 1, 0], [0, 0, 1]]

  c4:                           # dedicated Gate-3 lane camera — real line crossing
    transport: rtsp
    url: "rtsp://PHONE_C4_IP:8080/h264_ulaw.sdp"
    zone_id: G3-lane
    gate_id: G3
    gate_line: [[4, 0], [4, 5]]   # in/out counting line in floor metres
    homography: [[1, 0, 0], [0, 1, 0], [0, 0, 1]]
